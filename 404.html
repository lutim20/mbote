<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Mbote</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #FDF9F5; color: #1A1A2E; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .logo { font-size: 28px; font-weight: 900; color: #E8394A; margin-bottom: 40px; text-decoration: none; display: block; }
    .icon { font-size: 80px; margin-bottom: 20px; }
    h1 { font-size: 32px; font-weight: 900; color: #1A1A2E; margin-bottom: 12px; }
    p { font-size: 16px; color: #888; line-height: 1.7; margin-bottom: 32px; max-width: 400px; }
    .btn { background: #E8394A; color: #fff; border: none; padding: 14px 32px; border-radius: 50px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; text-decoration: none; display: inline-block; transition: background .2s; }
    .btn:hover { background: #C42E3C; }
    .btn-outline { background: transparent; color: #1A1A2E; border: 2px solid #E8E0D8; padding: 12px 28px; border-radius: 50px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; text-decoration: none; display: inline-block; margin-left: 12px; transition: border-color .2s; }
    .btn-outline:hover { border-color: #1A1A2E; }
  </style>
</head>
<body>
  <a href="index.html" class="logo">🍒 Mbote</a>
  <div class="icon">🍒</div>
  <h1>Page introuvable</h1>
  <p>Oops ! La page que tu cherches n'existe pas ou a été déplacée. Retourne à l'accueil pour continuer.</p>
  <div>
    <a href="index.html" class="btn">Retour à l'accueil</a>
    <a href="swipe.html" class="btn-outline">Swiper 🔥</a>
  </div>
</body>
</html>
