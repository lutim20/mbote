<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — Mbote</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #F7F3EE; color: #1A1A2E; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    :root { --cherry: #E8394A; --cherry-dark: #C42E3C; --orange: #FF8C42; --grape: #7B5EA7; --green: #27AE60; --dark: #1A1A2E; --sand: #F7F0E8; --muted: #888; --border: #E8E0D8; --white: #fff; }

    /* NAV */
    .top-nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10; }
    .nav-logo { font-size: 20px; font-weight: 900; color: var(--cherry); text-decoration: none; }
    .nav-title { font-size: 16px; font-weight: 800; color: var(--dark); }
    .nav-icon-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--sand); border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; }

    /* LAYOUT */
    .main { flex: 1; display: flex; overflow: hidden; }

    /* LEFT PANEL */
    .conv-panel { width: 320px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .conv-search { padding: 12px 16px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .search-input { width: 100%; background: var(--sand); border: none; border-radius: 50px; padding: 9px 16px; font-size: 13px; font-family: 'Nunito', sans-serif; color: var(--dark); outline: none; }
    .conv-section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; padding: 12px 16px 6px; flex-shrink: 0; }
    .conv-list { flex: 1; overflow-y: auto; }

    /* CONV ITEM */
    .conv-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: background .15s; border-bottom: 1px solid rgba(0,0,0,.04); }
    .conv-item:hover { background: var(--sand); }
    .conv-item.active { background: #FEECED; }
    .conv-avatar { width: 48px; height: 48px; border-radius: 50%; font-size: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; overflow: hidden; background: #FEECED; }
    .conv-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .conv-online { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; border-radius: 50%; background: var(--green); border: 2px solid var(--white); }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .conv-name { font-size: 14px; font-weight: 800; color: var(--dark); }
    .conv-time { font-size: 11px; color: var(--muted); font-weight: 600; flex-shrink: 0; }
    .conv-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
    .conv-preview.unread { color: var(--dark); font-weight: 700; }

    /* EMPTY CONV */
    .conv-empty { padding: 32px 20px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .conv-empty-icon { font-size: 40px; margin-bottom: 10px; }

    /* CHAT PANEL */
    .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #F7F3EE; }

    /* EMPTY CHAT */
    .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; color: var(--muted); }
    .empty-chat-icon { font-size: 56px; margin-bottom: 16px; }
    .empty-chat-title { font-size: 20px; font-weight: 900; color: var(--dark); margin-bottom: 8px; }
    .empty-chat-sub { font-size: 14px; line-height: 1.7; }

    /* CHAT HEADER */
    .chat-header { background: var(--white); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .chat-hav { width: 44px; height: 44px; border-radius: 50%; font-size: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; background: #FEECED; }
    .chat-hav img { width: 100%; height: 100%; object-fit: cover; }
    .chat-hinfo { flex: 1; }
    .chat-hname { font-size: 15px; font-weight: 800; color: var(--dark); }
    .chat-hmeta { font-size: 12px; color: var(--muted); margin-top: 1px; }

    /* ICEBREAKER */
    .icebreaker { margin: 12px 20px 0; background: linear-gradient(135deg, #F0EBF8, #E8E0F8); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .ice-icon { font-size: 22px; }
    .ice-text { flex: 1; }
    .ice-label { font-size: 11px; font-weight: 700; color: var(--grape); text-transform: uppercase; letter-spacing: .5px; }
    .ice-question { font-size: 13px; font-weight: 700; color: var(--dark); margin-top: 2px; line-height: 1.4; }
    .ice-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .ice-btn { background: var(--grape); color: #fff; border: none; padding: 7px 14px; border-radius: 50px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
    .ice-refresh { background: rgba(123,94,167,.15); color: var(--grape); border: none; padding: 7px 10px; border-radius: 50px; font-size: 14px; cursor: pointer; }

    /* MESSAGES */
    .messages-area { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 4px; }
    .msg-date { text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); margin: 8px 0; }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 2px; }
    .msg-row.me { justify-content: flex-end; }
    .msg-row.them { justify-content: flex-start; }
    .msg-av { width: 28px; height: 28px; border-radius: 50%; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; background: #FEECED; }
    .msg-av img { width: 100%; height: 100%; object-fit: cover; }
    .msg-av.hidden { visibility: hidden; }
    .msg-bubble { max-width: 65%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .msg-row.them .msg-bubble { background: var(--white); color: var(--dark); border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .msg-row.me .msg-bubble { background: var(--cherry); color: #fff; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 10px; opacity: .6; display: block; margin-top: 3px; }
    .msg-row.me .msg-time { text-align: right; }

    /* TYPING */
    .typing-row { display: none; align-items: flex-end; gap: 8px; margin-bottom: 4px; }
    .typing-row.show { display: flex; }
    .typing-bubble { background: var(--white); border-radius: 18px; border-bottom-left-radius: 4px; padding: 10px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); display: flex; gap: 4px; align-items: center; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

    /* INPUT */
    .chat-input-area { background: var(--white); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    .chat-input { flex: 1; background: var(--sand); border: 2px solid transparent; border-radius: 20px; padding: 9px 16px; font-size: 14px; font-family: 'Nunito', sans-serif; color: var(--dark); outline: none; resize: none; max-height: 100px; line-height: 1.4; transition: border-color .2s, background .2s; }
    .chat-input:focus { border-color: var(--cherry); background: var(--white); }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--cherry); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .2s; }
    .send-btn:hover:not(:disabled) { background: var(--cherry-dark); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* LOADING */
    .loading-conv { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .skeleton { border-radius: 50px; background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; height: 56px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* BOTTOM NAV */
    .bottom-nav { display: none; background: var(--white); border-top: 1px solid var(--border); padding: 10px 0 16px; justify-content: space-around; flex-shrink: 0; }
    .bnav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; opacity: .4; text-decoration: none; }
    .bnav-item.active { opacity: 1; }
    .bnav-icon { font-size: 22px; }
    .bnav-label { font-size: 9px; font-weight: 800; color: var(--dark); }

    @media (max-width: 768px) {
      .conv-panel { width: 100%; display: none; }
      .conv-panel.show { display: flex; }
      .chat-panel-wrap { display: none; flex: 1; flex-direction: column; overflow: hidden; }
      .chat-panel-wrap.show { display: flex; }
      .bottom-nav { display: flex; }
      .back-btn { display: flex !important; }
    }
    .back-btn { display: none; }
  </style>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#E8394A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mbote">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>

<div class="top-nav">
  <a href="index.html" class="nav-logo">🍒 Mbote</a>
  <div class="nav-title">Messages</div>
  <div style="display:flex;gap:8px">
    <a href="swipe.html" class="nav-icon-btn">🔥</a>
    <a href="profil.html" class="nav-icon-btn">👤</a>
  </div>
</div>

<div class="main">

  <!-- LEFT — CONVERSATIONS -->
  <div class="conv-panel show" id="convPanel">
    <div class="conv-search">
      <input class="search-input" type="text" placeholder="🔍 Rechercher..." id="searchInput">
    </div>
    <div class="conv-section-title">Mes matchs</div>
    <div class="conv-list" id="convList">
      <div class="loading-conv">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT — CHAT -->
  <div class="chat-panel-wrap show" id="chatPanelWrap">
    <div class="chat-panel" id="chatPanel">

      <!-- EMPTY STATE -->
      <div class="empty-chat" id="emptyChat">
        <div class="empty-chat-icon">💬</div>
        <div class="empty-chat-title">Tes messages</div>
        <p class="empty-chat-sub">Sélectionne une conversation<br>ou swipe pour trouver des matchs !</p>
      </div>

      <!-- CHAT VIEW -->
      <div id="chatView" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div class="chat-header">
          <button class="back-btn nav-icon-btn" id="backBtn">←</button>
          <div class="chat-hav" id="chatAvatar">👤</div>
          <div class="chat-hinfo">
            <div class="chat-hname" id="chatName">—</div>
            <div class="chat-hmeta" id="chatMeta">—</div>
          </div>
        </div>

        <div class="icebreaker" id="icebreakerBanner">
          <div class="ice-icon">🎲</div>
          <div class="ice-text">
            <div class="ice-label">Question brise-glace</div>
            <div class="ice-question" id="iceQuestion">Si tu pouvais voyager partout au Congo, quelle ville visiterais-tu en premier ?</div>
          </div>
          <div class="ice-actions">
            <button class="ice-refresh" id="iceRefreshBtn">🔄</button>
            <button class="ice-btn" id="iceSendBtn">Envoyer</button>
          </div>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="typing-row" id="typingRow">
          <div class="msg-av" id="typingAv">👤</div>
          <div class="typing-bubble">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>

        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInput" placeholder="Écris un message..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" disabled>➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="swipe.html"       class="bnav-item"><div class="bnav-icon">🔥</div><div class="bnav-label">Découvrir</div></a>
  <a href="messages_v2.html" class="bnav-item active"><div class="bnav-icon">💬</div><div class="bnav-label">Messages</div></a>
  <a href="profil.html"      class="bnav-item"><div class="bnav-icon">👤</div><div class="bnav-label">Profil</div></a>
</div>

<script type="module">
  import { auth, db, onAuthStateChanged, envoyerMessage } from "./firebase.js";
  import {
    collection, query, where, getDocs, doc, getDoc,
    onSnapshot, orderBy, addDoc, serverTimestamp, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const ICEBREAKERS = [
    "Si tu pouvais voyager partout au Congo, quelle ville visiterais-tu en premier ?",
    "Quel est le plat congolais que tu mangerais sans jamais te lasser ?",
    "C'est quoi ta chanson congolaise préférée de tous les temps ?",
    "Si tu devais décrire Kinshasa en un mot, ce serait lequel ?",
    "Quel est ton souvenir d'enfance préféré au Congo ?",
    "Si tu étais un fruit Mbote, lequel serais-tu et pourquoi ? 😄",
    "Quelle est la chose qui te manque le plus quand tu es loin du Congo ?",
    "Le meilleur endroit où manger à Kinshasa selon toi ?",
    "Tu préfères Fally Ipupa ou Innoss'B et pourquoi ? 😄",
  ];

  let currentUser   = null;
  let currentMatchId = null;
  let currentProfil  = null;
  let unsubMessages  = null;
  let matchsData     = [];
  let iceIdx         = 0;

  // ── AUTH ──────────────────────────────────────────────
  onAuthStateChanged(auth, async function(user) {
    if (!user) { window.location.href = "connexion.html"; return; }
    currentUser = user;
    await loadMatchs();
    setupEvents();
  });

  // ── CHARGER MATCHS ────────────────────────────────────
  async function loadMatchs() {
    try {
      var q    = query(collection(db, "matchs"), where("users", "array-contains", currentUser.uid));
      var snap = await getDocs(q);
      matchsData = [];

      for (var i = 0; i < snap.docs.length; i++) {
        var matchDoc = snap.docs[i];
        var data     = matchDoc.data();
        var autreUid = data.users[0] === currentUser.uid ? data.users[1] : data.users[0];

        try {
          var autreSnap = await getDoc(doc(db, "users", autreUid));
          if (autreSnap.exists()) {
            matchsData.push({
              matchId:  matchDoc.id,
              lastMsg:  data.lastMsg  || null,
              lastTime: data.lastMsgTime || null,
              profil:   { uid: autreUid, ...autreSnap.data() }
            });
          }
        } catch(e) { console.error(e); }
      }

      // Trier par dernier message
      matchsData.sort(function(a, b) {
        return (b.lastTime ? b.lastTime.seconds || 0 : 0) - (a.lastTime ? a.lastTime.seconds || 0 : 0);
      });

      renderConvList();
    } catch(e) {
      console.error("Erreur chargement matchs:", e);
      document.getElementById('convList').innerHTML = '<div class="conv-empty"><div class="conv-empty-icon">😕</div>Erreur de chargement.</div>';
    }
  }

  // ── AFFICHER LISTE CONVERSATIONS ──────────────────────
  function renderConvList() {
    var list = document.getElementById('convList');
    if (matchsData.length === 0) {
      list.innerHTML = '<div class="conv-empty"><div class="conv-empty-icon">🍒</div>Aucun match pour l\'instant.<br>Continue à swiper !</div>';
      return;
    }
    list.innerHTML = matchsData.map(function(m) {
      var avatarHtml = m.profil.photoURL
        ? '<img src="' + m.profil.photoURL + '">'
        : (m.profil.genre === 'femme' ? '👩🏾' : '👨🏾');
      var timeStr = m.lastTime ? formatTime(m.lastTime) : '';
      var preview = m.lastMsg || 'Nouveau match ! Lance la conversation 🍒';
      return '<div class="conv-item" id="conv_' + m.matchId + '" onclick="window._openChat(\'' + m.matchId + '\')">' +
        '<div class="conv-avatar">' + avatarHtml + '</div>' +
        '<div class="conv-info">' +
          '<div class="conv-name-row">' +
            '<span class="conv-name">' + (m.profil.prenom || 'Utilisateur') + '</span>' +
            '<span class="conv-time">' + timeStr + '</span>' +
          '</div>' +
          '<div class="conv-preview ' + (!m.lastMsg ? 'unread' : '') + '">' + preview + '</div>' +
        '</div>' +
        '</div>';
    }).join('');
  }

  // ── OUVRIR CHAT ───────────────────────────────────────
  window._openChat = async function(matchId) {
    currentMatchId = matchId;
    var match = matchsData.find(function(m) { return m.matchId === matchId; });
    if (!match) return;
    currentProfil = match.profil;

    // Header
    var av = document.getElementById('chatAvatar');
    if (currentProfil.photoURL) {
      av.innerHTML = '<img src="' + currentProfil.photoURL + '">';
    } else {
      av.textContent = currentProfil.genre === 'femme' ? '👩🏾' : '👨🏾';
    }
    document.getElementById('chatName').textContent = currentProfil.prenom || 'Utilisateur';
    document.getElementById('chatMeta').textContent = (currentProfil.fruit || '') + ' · ' + (currentProfil.ville || 'Congo');
    document.getElementById('typingAv').textContent = currentProfil.genre === 'femme' ? '👩🏾' : '👨🏾';

    // Afficher le brise-glace si pas encore de messages
    document.getElementById('icebreakerBanner').style.display = match.lastMsg ? 'none' : 'flex';

    // Afficher le chat
    document.getElementById('emptyChat').style.display  = 'none';
    document.getElementById('chatView').style.display   = 'flex';

    // Marquer actif
    document.querySelectorAll('.conv-item').forEach(function(el) { el.classList.remove('active'); });
    var convEl = document.getElementById('conv_' + matchId);
    if (convEl) convEl.classList.add('active');

    // Mobile
    if (window.innerWidth <= 768) {
      document.getElementById('convPanel').classList.remove('show');
      document.getElementById('chatPanelWrap').classList.add('show');
    }

    // Écouter messages en temps réel
    if (unsubMessages) unsubMessages();
    document.getElementById('messagesArea').innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">Chargement...</div>';

    var msgQuery = query(
      collection(db, "matchs", matchId, "messages"),
      orderBy("timestamp", "asc")
    );
    unsubMessages = onSnapshot(msgQuery, function(snap) {
      renderMessages(snap.docs.map(function(d) { return { id: d.id, ...d.data() }; }));
    });
  };

  // ── AFFICHER MESSAGES ─────────────────────────────────
  function renderMessages(msgs) {
    var area = document.getElementById('messagesArea');
    if (msgs.length === 0) {
      area.innerHTML = '<div style="text-align:center;padding:32px 20px;color:var(--muted)">' +
        '<div style="font-size:36px;margin-bottom:10px">👋</div>' +
        '<div style="font-size:14px;font-weight:700">Dis bonjour à ' + (currentProfil ? currentProfil.prenom : '') + ' !</div>' +
        '</div>';
      return;
    }

    var html = '<div class="msg-date">Aujourd\'hui</div>';
    var prevFrom = null;
    msgs.forEach(function(msg, i) {
      var isMe   = msg.from === currentUser.uid;
      var side   = isMe ? 'me' : 'them';
      var next   = msgs[i + 1];
      var isLast = !next || next.from !== msg.from;
      var time   = msg.timestamp && msg.timestamp.toDate ? formatMsgTime(msg.timestamp.toDate()) : '';
      var showAv = !isMe && isLast;
      var avHtml = currentProfil && currentProfil.photoURL
        ? '<img src="' + currentProfil.photoURL + '">'
        : (currentProfil && currentProfil.genre === 'femme' ? '👩🏾' : '👨🏾');

      html += '<div class="msg-row ' + side + '">';
      if (!isMe) {
        html += '<div class="msg-av ' + (showAv ? '' : 'hidden') + '">' + avHtml + '</div>';
      }
      html += '<div><div class="msg-bubble">' + escHtml(msg.texte) + '</div>';
      if (isLast) html += '<span class="msg-time">' + time + (isMe ? ' · ✓✓' : '') + '</span>';
      html += '</div></div>';
      prevFrom = msg.from;
    });

    area.innerHTML = html;
    setTimeout(function() { area.scrollTop = area.scrollHeight; }, 50);
  }

  // ── ENVOYER MESSAGE ───────────────────────────────────
  async function sendMsg() {
    var input = document.getElementById('chatInput');
    var texte = input.value.trim();
    if (!texte || !currentMatchId) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('icebreakerBanner').style.display = 'none';

    try {
      await addDoc(collection(db, "matchs", currentMatchId, "messages"), {
        from:      currentUser.uid,
        texte:     texte,
        lu:        false,
        timestamp: serverTimestamp()
      });
      await updateDoc(doc(db, "matchs", currentMatchId), {
        lastMsg:     texte,
        lastMsgTime: serverTimestamp(),
        lastMsgFrom: currentUser.uid
      });
      // Mettre à jour la liste localement
      var m = matchsData.find(function(x) { return x.matchId === currentMatchId; });
      if (m) { m.lastMsg = texte; renderConvList(); }
    } catch(e) { console.error("Erreur envoi:", e); }
  }

  // ── EVENTS ────────────────────────────────────────────
  function setupEvents() {
    // Send button
    document.getElementById('sendBtn').addEventListener('click', sendMsg);

    // Enter to send
    document.getElementById('chatInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    // Auto resize + toggle send btn
    document.getElementById('chatInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
      document.getElementById('sendBtn').disabled = !this.value.trim();
    });

    // Icebreaker
    document.getElementById('iceSendBtn').addEventListener('click', function() {
      var q = document.getElementById('iceQuestion').textContent;
      document.getElementById('chatInput').value = q;
      document.getElementById('sendBtn').disabled = false;
      sendMsg();
    });
    document.getElementById('iceRefreshBtn').addEventListener('click', function() {
      iceIdx = (iceIdx + 1) % ICEBREAKERS.length;
      document.getElementById('iceQuestion').textContent = ICEBREAKERS[iceIdx];
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', function() {
      var val = this.value.toLowerCase();
      document.querySelectorAll('.conv-item').forEach(function(el) {
        var name = el.querySelector('.conv-name').textContent.toLowerCase();
        el.style.display = name.includes(val) ? '' : 'none';
      });
    });

    // Back mobile
    document.getElementById('backBtn').addEventListener('click', function() {
      document.getElementById('convPanel').classList.add('show');
      document.getElementById('chatPanelWrap').classList.remove('show');
    });
  }

  // ── HELPERS ───────────────────────────────────────────
  function formatTime(ts) {
    if (!ts || !ts.toDate) return '';
    var d    = ts.toDate();
    var now  = new Date();
    var diff = (now - d) / 1000;
    if (diff < 60)    return 'À l\'instant';
    if (diff < 3600)  return Math.floor(diff / 60) + 'min';
    if (diff < 86400) return d.getHours() + 'h' + String(d.getMinutes()).padStart(2, '0');
    return d.toLocaleDateString('fr', { day: 'numeric', month: 'short' });
  }
  function formatMsgTime(d) {
    return d.getHours() + 'h' + String(d.getMinutes()).padStart(2, '0');
  }
  function escHtml(t) {
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
</script>
